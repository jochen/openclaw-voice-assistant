# Voice Assistant - Profil-Konfiguration
# Kopiere diese Datei nach config.yaml und trage deine Werte ein.
# config.yaml ist in .gitignore und wird nie eingecheckt (enthält Secrets).
#
# Zwei Modi pro Profil möglich:
#   mode: local      → Mikrofon + Lautsprecher am Pi (ALSA), Wakeword mit openwakeword
#   mode: respeaker  → Mikrofon + LED-Ring + optional Lautsprecher am ReSpeaker-Board
#                      (XVF3800 + XIAO ESP32S3 mit ESPHome-Firmware)
#
# Das alte flache Schema (ohne mode/local_audio/respeaker/leds-Blöcke) wird
# weiterhin akzeptiert und als mode: local interpretiert.

profiles:

  # ---------------------------------------------------------------------
  # Beispiel "local" - Mikrofon/Lautsprecher direkt am Pi
  # ---------------------------------------------------------------------
  clawdpi:
    mode: local

    local_audio:
      device_index: 1                             # ALSA-Mic-Index (arecord -l)
      playback_device: "plughw:CARD=ZM350,DEV=0"  # ALSA-Ausgabe (aplay -l)
      rate_in: 48000                              # wird intern auf 16kHz resampelt
      resample: true

    leds:
      wled:
        enabled: true
        host: "wled.local"                        # WLED-Controller Hostname/IP
      respeaker_ring:
        enabled: false                            # im local-Modus irrelevant

    # Speaches GPU-Container (OpenAI-kompatibler STT/TTS-Server)
    speaches_base: "http://192.168.111.126:8000"
    speaches_stt_model: "guillaumekln/faster-whisper-medium"
    speaches_tts_model: "speaches-ai/piper-de_DE-thorsten-medium"
    speaches_tts_voice: "de_DE-thorsten-medium"

    openclaw_token: "DEIN_TOKEN_HIER"
    openclaw_session: "agent:main:telegram:group:DEINE_CHAT_ID"

    telegram_bot_token: "DEIN_BOT_TOKEN_HIER"
    telegram_chat_id: "-DEINE_CHAT_ID"

    tts_prefix: ""

    # Locale — all fields optional, defaults shown here (German)
    # locale:
    #   wakeword_ack: "Ja?"
    #   confirmation_prefix: "Ich habe verstanden: "
    #   no_reply_fallback: "Entschuldigung, ich konnte keine Antwort erhalten."
    #   openclaw_voice_instruction: >
    #     [VOICE: Call all necessary tools first, then reply in max 2-3 spoken
    #     sentences. No markdown, no lists, no abbreviations.
    #     Never invent anything — either call a tool or say what you don't know.]
    #   thinking_phrases:
    #     - "Einen Moment bitte."
    #     - "Ich schaue kurz nach."
    #     - "Ich bin noch dabei."
    #     - "Fast fertig."
    #     - "Noch einen Augenblick."

  # ---------------------------------------------------------------------
  # Beispiel "respeaker" - Mic + LED-Ring + Speaker am ReSpeaker
  # ---------------------------------------------------------------------
  openclaw:
    mode: respeaker

    respeaker:
      host: "respeaker.local"                     # ESPHome-Gerät im WLAN
      port: 6053
      encryption_key: ""                          # Native-API-Key falls gesetzt
      use_speaker: true                           # TTS über ReSpeaker-Speaker
                                                  # (false → Fallback auf local_audio.playback_device)

    local_audio:
      # wird nur gebraucht, wenn use_speaker=false (Fallback)
      playback_device: "plughw:CARD=P710e,DEV=0"

    leds:
      wled:
        enabled: true
        host: "wled.local"                        # WLED kann parallel aktiv sein
      respeaker_ring:
        enabled: true                             # LED-Ring am ReSpeaker nutzen

    speaches_base: "http://192.168.111.126:8000"
    speaches_stt_model: "xkeyC/whisper-large-v3-turbo-gguf"
    speaches_tts_model: "speaches-ai/piper-de_DE-thorsten_emotional-medium"
    speaches_tts_voice: "de_DE-thorsten_emotional-medium"

    openclaw_token: "DEIN_TOKEN_HIER"
    openclaw_session: "agent:main:telegram:group:DEINE_CHAT_ID"

    telegram_bot_token: "DEIN_BOT_TOKEN_HIER"
    telegram_chat_id: "-DEINE_CHAT_ID"

    tts_prefix: "hm "

    # locale: (see clawdpi profile above for available fields and defaults)

# Hostname-Zuordnung: Welcher Hostname-Substring → welches Profil
hostname_map:
  clawdpi: clawdpi
  openclaw: openclaw
