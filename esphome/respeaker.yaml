# ESPHome-Firmware für ReSpeaker XVF3800 + XIAO ESP32-S3
# Wird vom OpenClaw Voice Assistant über ESPHome Native API (Port 6053) gesteuert.
# Kein Home Assistant erforderlich — Python-Client nutzt aioesphomeapi direkt.
#
# Flashen:
#   cd /home/pi/openclaw_voice_assist
#   esphome-venv/bin/esphome run esphome/respeaker.yaml --device /dev/ttyACM0
#   OTA: esphome-venv/bin/esphome run esphome/respeaker.yaml --device respeaker-openclaw.local
#
# Wakeword läuft auf dem Pi (openwakeword "hey jarvis").
# Der ESP streamt Audio kontinuierlich via voice_assistant + button trigger.

substitutions:
  device_name: respeaker-openclaw
  friendly_name: "ReSpeaker OpenClaw"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  min_version: 2026.4.0
  on_boot:
    - priority: -100
      then:
        - script.execute: control_leds

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_ESP32S3_INSTRUCTION_CACHE_32KB: "y"
      CONFIG_SPIRAM_RODATA: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 10min
  on_connect:
    - script.execute: control_leds
  on_disconnect:
    - script.execute: control_leds

logger:
  level: INFO
  logs:
    i2s_audio: WARN
    respeaker_xvf3800: INFO
    voice_assistant: INFO

http_request:
  timeout: 10s

# ESPHome Native API — darüber spricht der Python-Client (aioesphomeapi, Port 6053)
api:
  # encryption:
  #   key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

i2c:
  - id: internal_i2c
    sda: GPIO5
    scl: GPIO6
    scan: true
    frequency: 100kHz

# I2S-Audio — LRCLK/BCLK werden vom XVF3800 als Master getrieben
i2s_audio:
  - id: i2s_output
    i2s_lrclk_pin:
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO8
      allow_other_uses: true

  - id: i2s_input
    i2s_lrclk_pin:
      number: GPIO7
      allow_other_uses: true
    i2s_bclk_pin:
      number: GPIO8
      allow_other_uses: true

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_din_pin: GPIO43
    adc_type: external
    pdm: false
    sample_rate: 48000
    bits_per_sample: 32bit
    i2s_mode: secondary
    i2s_audio_id: i2s_input
    channel: stereo

speaker:
  - platform: i2s_audio
    id: i2s_out_speaker
    dac_type: external
    i2s_dout_pin: GPIO44
    i2s_audio_id: i2s_output
    i2s_mode: secondary
    channel: stereo
    bits_per_sample: 32bit
    sample_rate: 48000
    timeout: never

media_player:
  - platform: speaker
    id: respeaker_player
    name: "ReSpeaker Player"
    announcement_pipeline:
      speaker: i2s_out_speaker
      format: WAV

audio_dac:
  - platform: aic3104
    id: aic3104_dac
    i2c_id: internal_i2c

external_components:
  - source:
      type: git
      url: https://github.com/formatBCE/esphome
      ref: respeaker_microphone
    components:
      - i2s_audio
    refresh: 0s
  - source:
      type: git
      url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration
      ref: main
    components:
      - respeaker_xvf3800
      - aic3104
    refresh: 0s

# XVF3800-DSP über I2C
respeaker_xvf3800:
  id: respeaker
  address: 0x2C
  mute_switch:
    id: mic_mute_switch
    name: "Microphone Mute"
    update_interval: 1s
  dfu_version:
    name: "DSP Firmware Version"
    update_interval: 120s
  led_beam_sensor:
    name: "Voice Direction"
    id: beam_direction
    internal: true
  firmware:
    url: https://github.com/formatBCE/Respeaker-XVF3800-ESPHome-integration/raw/refs/heads/main/application_xvf3800_inthost-lr48-sqr-i2c-v1.0.7-release.bin
    version: "1.0.7"
    md5: 043a848f544ff2c7265ac19685daf5de

# Button damit der Pi eine Hör-Session starten kann (kein micro_wakeword mehr —
# Wakeword läuft als openwakeword auf dem Pi gegen den Audio-Stream).
button:
  - platform: template
    name: "Start Listening"
    id: start_listening_btn
    on_press:
      - voice_assistant.start:

number:
  - platform: template
    name: "LED Phase"
    id: led_phase_input
    min_value: 0
    max_value: 5
    step: 1
    optimistic: true
    on_value:
      - lambda: id(va_phase) = (int)x;
      - script.execute: control_leds

# voice_assistant — Audio-Streaming-Protokoll für aioesphomeapi.
# Kein micro_wakeword: Pi triggert via button, streamt Audio, macht Wakeword selbst.
voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics
    channels: 1
  media_player: respeaker_player
  noise_suppression_level: 1
  auto_gain: 31dBFS
  volume_multiplier: 4.0
  on_listening:
    - script.execute: led_listening
  on_stt_vad_end:
    - script.execute: led_thinking
  on_end:
    - script.execute: led_idle
  on_error:
    - script.execute: led_idle

# --- LED-Steuerung ---
globals:
  - id: va_phase
    type: int
    restore_value: no
    initial_value: '0'

script:
  - id: control_leds
    mode: restart
    then:
      - lambda: |-
          std::array<uint32_t, 12> colors;
          int phase = id(va_phase);
          uint32_t col = 0x000000;
          if (phase == 0) col = 0x000050;        // Blau — idle
          else if (phase == 1) col = 0x005000;   // Grün — listening
          else if (phase == 2) col = 0x503C00;   // Gelb — thinking
          else if (phase == 3) col = 0x003C3C;   // Cyan — replying
          for (auto& c : colors) c = col;
          id(respeaker).set_led_ring(colors.data());

  - id: led_idle
    then:
      - lambda: id(va_phase) = 0;
      - script.execute: control_leds

  - id: led_listening
    then:
      - lambda: id(va_phase) = 1;
      - script.execute: control_leds

  - id: led_thinking
    then:
      - lambda: id(va_phase) = 2;
      - script.execute: control_leds

  - id: led_replying
    then:
      - lambda: id(va_phase) = 3;
      - script.execute: control_leds
